<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام تأجير السيارات</title>

    <style>
        body{
            font-family:Tahoma;
            background:#f5f5f5;
            padding:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        th{
            background:#0d6efd;
            color:white;
        }

        h1{
            text-align:center;
        }
    </style>

</head>

<body>

<h1>🚗 المركبات</h1>

<table>

<tr>
<th>الرقم</th>
<th>النوع</th>
<th>الموديل</th>
<th>اللون</th>
<th>اللوحة</th>
<th>الحالة</th>
<th>الإيجار اليومي</th>
</tr>

{% for car in cars %}

<tr>

<td>{{car.id}}</td>
<td>{{car.type}}</td>
<td>{{car.model}}</td>
<td>{{car.color}}</td>
<td>{{car.plate}}</td>
<td>{{car.status}}</td>
<td>{{car.daily_rate}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
