<!DOCTYPE html>
<html>
<head>
    <title>Contracts</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        .navbar {
            background: #111827;
            color: white;
            padding: 15px;
            font-size: 20px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        input, select {
            padding: 10px;
            margin: 5px;
        }

        button {
            padding: 10px 15px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f3f4f6;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .active {
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>

<body>

<div class="navbar">
    📄 Contracts System
</div>

<div class="container">

    <!-- CREATE CONTRACT -->
    <div class="card">
        <h2>➕ Create New Contract</h2>

        <form method="POST" action="/create_contract">

            <input name="customer_name" placeholder="Customer Name" required>
            <input name="customer_phone" placeholder="Phone" required>

            <select name="car_id" required>
                <option value="">Select Car</option>
                {% for car in cars %}
                    <option value="{{ car.id }}">
                        {{ car.model }} - {{ car.plate }}
                    </option>
                {% endfor %}
            </select>

            <input type="date" name="start_date" required>
            <input type="date" name="end_date" required>
            <input name="total_price" placeholder="Total Price">

            <button type="submit">Create Contract</button>
        </form>
    </div>

    <!-- CONTRACT LIST -->
    <div class="card">
        <h2>📋 Active Contracts</h2>

        <table>
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Phone</th>
                <th>Car</th>
                <th>Plate</th>
                <th>Status</th>
            </tr>

            {% for c in contracts %}
            <tr>
                <td>{{ c.id }}</td>
                <td>{{ c.customer_name }}</td>
                <td>{{ c.customer_phone }}</td>
                <td>{{ c.model }}</td>
                <td>{{ c.plate }}</td>
                <td>
                    <span class="badge active">{{ c.status }}</span>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

</div>

</body>
</html>
