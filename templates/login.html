<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>المتحدة لتأجير السيارات</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{

background:linear-gradient(135deg,#0f172a,#1e3a8a);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.login{

width:420px;

background:white;

padding:40px;

border-radius:15px;

box-shadow:0 20px 40px rgba(0,0,0,.3);

text-align:center;

}

.logo{

font-size:70px;

margin-bottom:10px;

}

h1{

margin-bottom:5px;

color:#0f172a;

}

p{

color:#666;

margin-bottom:30px;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

font-size:16px;

border-radius:8px;

border:1px solid #ccc;

}

button{

width:100%;

padding:15px;

font-size:18px;

background:#2563eb;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

.footer{

margin-top:25px;

font-size:13px;

color:#777;

}

</style>

</head>

<body>

<div class="login">

<div class="logo">🚗</div>

<h1>المتحدة لتأجير السيارات</h1>

<p>Rental Management System</p>

<form method="POST" action="/login">

<input
name="username"
placeholder="اسم المستخدم"
required>

<input
type="password"
name="password"
placeholder="كلمة المرور"
required>

<button>

تسجيل الدخول

</button>

</form>

<div class="footer">

Version 1.0

</div>

</div>

</body>

</html>
