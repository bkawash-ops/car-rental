<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فاتورة العقد</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f4f6f8;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 600px;
    margin: auto;
}

h2 {
    text-align: center;
}

table {
    width: 100%;
    margin-top: 20px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

.print {
    margin-top: 20px;
    text-align: center;
}

button {
    padding: 10px 15px;
    background: #111827;
    color: white;
    border: none;
    border-radius: 6px;
}
</style>

</head>

<body onload="window.print()">

<div class="box">

<h2>فاتورة تأجير سيارة</h2>

<table>
<tr><td>اسم العميل</td><td>{{ c.customer_name }}</td></tr>
<tr><td>الهاتف</td><td>{{ c.customer_phone }}</td></tr>
<tr><td>السيارة</td><td>{{ c.model }} - {{ c.plate }}</td></tr>
<tr><td>من</td><td>{{ c.start_date }}</td></tr>
<tr><td>إلى</td><td>{{ c.end_date }}</td></tr>
<tr><td>الأيام</td><td>{{ c.days }}</td></tr>
<tr><td>الإجمالي</td><td>{{ c.total_price }}</td></tr>
<tr><td>المدفوع</td><td>{{ c.paid_amount }}</td></tr>
<tr><td>المتبقي</td><td>{{ c.remaining }}</td></tr>
<tr><td>الحالة</td><td>{{ c.status }}</td></tr>
</table>

<div class="print">
<button onclick="window.print()">🖨 طباعة</button>
</div>

</div>

</body>
</html>
